        :root {
            --primary-dark: #0b0f19;

            color: var(--text-light);
            padding: 20px;
            min-height: 100vh;
        }

            margin: 0 auto;
        }

            margin-bottom: 40px;

            color: var(--accent-gold);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
        }
