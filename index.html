<<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>جهاز اختيار الأرقام - آسياسيل</title>
  <style>
    body {
      font-family: 'Tahoma', sans-serif;
      background: linear-gradient(to bottom, #ffffff, #ffe5e5);
      margin: 0;
      padding: 0;
      direction: rtl;
    }
    .device {
      width: 400px;
      margin: 30px auto;
      border: 2px solid #ccc;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      overflow: hidden;
      background: #f8f9fa;
    }
    header {
      text-align: center;
      background: #d60000;
      padding: 15px;
    }
    header img {
      width: 150px;
    }
    h1 {
      text-align: center;
      color: #d60000;
      font-size: 18px;
      margin: 10px 0;
    }
    .options {
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }
    .option {
      background: #fff;
      border: 1px solid #ccc;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }
    .option:hover {
      background: #ffe5e5;
      border-color: #d60000;
    }
    .search-box {
      text-align: center;
      margin: 10px;
    }
    input {
      padding: 8px;
      width: 70%;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      padding: 8px 12px;
      margin-left: 5px;
      background: #d60000;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .numbers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
    }
    .num-box {
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }
    .num-box:hover {
      background: #ffe5e5;
      border-color: #d60000;
    }
    .summary {
      background: #fff;
      border-top: 2px solid #d60000;
      padding: 15px;
      font-size: 14px;
    }
    .summary h2 {
      color: #d60000;
      font-size: 16px;
    }
    .nav-buttons {
      text-align: center;
      padding: 10px;
    }
    .nav-buttons button {
      margin: 0 5px;
    }
  </style>
</head>
<body>
  <div class="device">
    <header>
      <img src="asiacell-logo.png" alt="Asiacell Logo">
    </header>
    <h1>اختيار رقمك المميز</h1>

    <div class="options">
      <div class="option">REGULAR</div>
      <div class="option">SILVER</div>
      <div class="option">GOLD</div>
      <div class="option">GOLD+</div>
    </div>

    <div class="search-box">
      <input type="text" id="search" placeholder="أدخل 4 إلى 10 أرقام...">
      <button onclick="searchNumbers()">بحث</button>
    </div>

    <div class="numbers" id="numbers">
