<Window x:Class="AsiacellNumbersApp.MainWindow"
        xmlns="http://schemas.microsoft.com/winfx/2006/xaml/presentation"
        xmlns:x="http://schemas.microsoft.com/winfx/2006/xaml"
        Title="الأرقام المميزة - آسياسيل" Height="500" Width="400">
    <Grid Background="#FFF8F9FA">
        <StackPanel Margin="10">
            <!-- شعار -->
            <Border Background="#D60000" CornerRadius="8" Padding="10" HorizontalAlignment="Center">
                <TextBlock Text="Asiacell" Foreground="White" FontSize="24" FontWeight="Bold"/>
            </Border>

            <!-- مربع البحث -->
            <StackPanel Orientation="Horizontal" Margin="10">
                <TextBox x:Name="txtSearch" Width="250" Height="30" Margin="0,0,5,0" 
                         PlaceholderText="ابحث عن رقم..."/>
                <Button Content="بحث" Width="80" Click="BtnSearch_Click"/>
            </StackPanel>

            <!-- قائمة الأرقام -->
            <ListBox x:Name="lstNumbers" Height="250" SelectionChanged="LstNumbers_SelectionChanged"/>

            <!-- ملخص الطلب -->
            <Border Background="White" BorderBrush="#D60000" BorderThickness="2" CornerRadius="8" Padding="10" Margin="10,5,10,0">
                <StackPanel>
                    <TextBlock Text="ملخص الطلب" Foreground="#D60000" FontSize="16" FontWeight="Bold"/>
                    <TextBlock x:Name="lblSelected" Text="الرقم المختار: لم يتم اختيار رقم" Margin="0,5,0,0"/>
                    <TextBlock Text="السعر: 50,000 دينار"/>
                    <TextBlock Text="رسوم الحجز: 0 دينار"/>
                    <TextBlock Text="المجموع: 50,000 دينار"/>
                </StackPanel>
            </Border>
        </StackPanel>
    </Grid>
</Window>

        private void BtnSearch_Click(object sender, RoutedEventArgs e)
        {
            string filter = txtSearch.Text;
            var filtered = numbers.Where(n => n.Contains(filter)).ToArray();

        }

        private void LstNumbers_SelectionChanged(object sender, System.Windows.Controls.SelectionChangedEventArgs e)

                lblSelected.Text = "الرقم المختار: " + lstNumbers.SelectedItem.ToString();
