<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>جهاز اختيار الأرقام - آسياسيل</title>
  <style>
    body {
      font-family: 'Tahoma', sans-serif;
      background: linear-gradient(to bottom, #ffffff, #ffe5e5);
      margin: 0;
      padding: 0;
      direction: rtl;
    }
    .device {
      width: 420px;
      margin: 30px auto;
      border: 2px solid #ccc;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      overflow: hidden;
      background: #f8f9fa;
    }
    header {
      text-align: center;
      background: #d60000;
      padding: 15px;
    }
    header img {
      width: 150px;
    }
    h1 {
      text-align: center;
      color: #d60000;
      font-size: 18px;
      margin: 10px 0;
    }
    .options {
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }
    .option {
      background: #fff;
      border: 1px solid #ccc;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }
    .option:hover {
      background: #ffe5e5;
      border-color: #d60000;
    }
    .search-box {
      text-align: center;
      margin: 10px;
    }
    input {
      padding: 8px;
      width: 70%;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      padding: 8px 12px;
      margin-left: 5px;
      background: #d60000;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .numbers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
      max-height: 200px;
      overflow-y: auto;
    }
    .num-box {
      background: #fff;
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
    }
    .num-box:hover {
      background: #ffe5e5;
      border-color: #d60000;
    }
    .summary {
      background: #fff;
      border-top: 2px solid #d60000;
      padding: 15px;
      font-size: 14px;
    }
    .summary h2 {
      color: #d60000;
      font-size: 16px;
    }
    .nav-buttons {
      text-align: center;
      padding: 10px;
    }
    .nav-buttons button {
      margin: 0 5px;
    }
  </style>
</head>
<body>
  <div class="device">
    <header>
      <img src="asiacell-logo.png" alt="Asiacell Logo">
    </header>
    <h1>اختيار رقمك المميز</h1>

    <div class="options">
      <div class="option">REGULAR</div>
      <div class="option">SILVER</div>
      <div class="option">GOLD</div>
      <div class="option">GOLD+</div>
    </div>

    <div class="search-box">
      <input type="text" id="search" placeholder="أدخل 4 إلى 10 أرقام...">
      <button onclick="searchNumbers()">بحث</button>
    </div>

    <div class="numbers" id="numbers">
      <!-- أمثلة من فئة 50 ألف -->
      <div class="num-box" onclick="selectNumber('7766600049')">7766600049</div>
      <div class="num-box" onclick="selectNumber('7766600034')">7766600034</div>
      <div class="num-box" onclick="selectNumber('7766600058')">7766600058</div>
      <div class="num-box" onclick="selectNumber('7755550079')">7755550079</div>
      <div class="num-box" onclick="selectNumber('7755533382')">7755533382</div>
      <div class="num-box" onclick="selectNumber('7766600053')">7766600053</div>
      <div class="num-box" onclick="selectNumber('7766600042')">7766600042</div>
      <div class="num-box" onclick="selectNumber('7766600092')">7766600092</div>
      <div class="num-box" onclick="selectNumber('7755551138')">7755551138</div>
      <div class="num-box" onclick="selectNumber('7755533990')">7755533990</div>
      <!-- تقدر تكمل باقي الأرقام من الجدول -->
    </div>

    <div class="summary" id="summary">
      <h2>ملخص الطلب</h2>
      <p>الرقم: <span id="selectedNumber">لم يتم اختيار رقم</span></p>
      <p>السعر: 50,000 دينار</p>
      <p>رسوم الحجز: 0 دينار</p>
      <p>المجموع: 50,000 دينار</p>
    </div>

    <div class="nav-buttons">
      <button>BACK</button>
      <button>CONTINUE</button>
    </div>
  </div>

  <script>
    function selectNumber(num) {
      document.getElementById('selectedNumber').textContent = num;
    }
    function searchNumbers() {
      const filter = document.getElementById('search').value;
      const boxes = document.querySelectorAll('.num-box');
      boxes.forEach(box => {
        if (box.textContent.includes(filter)) {
          box.style.display = '';
        } else {
          box.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
