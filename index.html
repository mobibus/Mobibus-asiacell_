<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الأرقام المميزة - آسياسيل</title>
  <style>
    body {
      font-family: 'Tahoma', sans-serif;
      background: linear-gradient(to bottom, #ffffff, #ffe5e5);
      margin: 0;
      padding: 20px;
      direction: rtl;
    }
    header {
      text-align: center;
      margin-bottom: 20px;
      background: #d60000;
      padding: 15px;
      border-radius: 8px;
    }
    header img {
      width: 220px;
      animation: fadeInDown 1.5s ease;
    }
    @keyframes fadeInDown {
      from {opacity: 0; transform: translateY(-30px);}
      to {opacity: 1; transform: translateY(0);}
    }
    h1 {
      text-align: center;
      color: #d60000;
      margin-top: 10px;
    }
    .search-box {
      text-align: center;
      margin: 20px 0;
    }
    input {
      padding: 10px;
      width: 60%;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
    }
    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      padding: 20px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.25);
    }
    .card h2 {
      margin-bottom: 10px;
      font-weight: bold;
    }
    .numbers {
      list-style: none;
      padding: 0;
    }
    .numbers li {
      padding: 5px 0;
      border-bottom: 1px solid #eee;
    }
    /* ألوان مميزة لكل فئة */
    .f50k h2 { color: #0077b6; }
    .f100k h2 { color: #0096c7; }
    .f250k h2 { color: #00b4d8; }
    .f500k h2 { color: #48cae4; }
    .f1m h2 { color: #e63946; }
    .f2m h2 { color: #ffb703; }
    .f3_5m h2 { color: #9d0208; }
  </style>
</head>
<body>
  <header>
    <img src="asiacell-logo.png" alt="Asiacell Logo">
  </header>
  <h1>الأرقام المميزة - آسياسيل</h1>
  <div class="search-box">
    <input type="text" id="search" placeholder="ابحث عن رقم...">
  </div>
  <div class="categories" id="categories">
    <div class="card f50k">
      <h2>فئة 50,000 دينار</h2>
      <ul class="numbers">
        <li>7766600049</li>
        <li>7766600034</li>
        <li>7766600058</li>
        <li>7755550079</li>
        <li>7755533382</li>
        <!-- تقدر تضيف باقي الأرقام من القائمة الكاملة -->
      </ul>
    </div>
    <div class="card f100k">
      <h2>فئة 100,000 دينار</h2>
      <ul class="numbers">
        <li>0770 100 0001</li>
        <li>0770 100 0002</li>
        <li>0770 100 0003</li>
        <li>0770 100 0004</li>
      </ul>
    </div>
    <div class="card f250k">
      <h2>فئة 250,000 دينار</h2>
      <ul class="numbers">
        <li>0770 250 0001</li>
        <li>0770 250 0002</li>
