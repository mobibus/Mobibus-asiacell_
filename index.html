<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>واجهة تعديل الملفات مع أرقام الأسطر</title>
    <style>
        :root {
            --bg-color: #f4f1ea;       /* خلفية كلاسيكية دافئة */
            --panel-bg: #ffffff;       /* خلفية لوحة التحكم */
            --text-color: #3d3a35;     /* لون نصوص داكن مريح */
            --primary-color: #8b7355;  /* لون برونزي كلاسيكية */
            --primary-hover: #6e5a42;  
            --border-color: #d1c7bd;   /* لون الحواف */
            --line-number-bg: #fdfcf7; /* خلفية شريط الأرقام */
            --line-number-color: #a89f91; /* لون الأرقام */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        /* شريط التحكم العلوي */
        .toolbar {
            background-color: #faf8f5;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .file-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
        }

        .file-input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            width: 60%;
            background-color: #fff;
            outline: none;
        }

        /* الأزرار */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary { background-color: var(--primary-color); color: #fff; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-secondary { background-color: transparent; color: var(--text-color); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: #f0eae1; }

        /* منطقة المحرر والأرقام */
        .editor-container {
            display: flex;
            position: relative;
            background-color: #fdfcf7;
            height: 400px;
            border-bottom: 1px solid var(--border-color);
        }

        /* شريط الأرقام الجانبي */
        .line-numbers {
            width: 45px;
            text-align: center;
            background-color: var(--line-number-bg);
            color: var(--line-number-color);
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.6;
            padding: 20px 0;
            box-sizing: border-box;
            border-left: 1px solid var(--border-color); /* يفصل الأرقام عن النص */
            overflow: hidden;
            user-select: none;
        }

        /* منطقة كتابة النص */
        .editor-textarea {
            flex-grow: 1;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
            border: none;
            resize: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            line-height: 1.6;
            color: #2c251e;
            background-color: transparent;
            outline: none;
            overflow-y: auto;
        }

        /* شريط الحالة السفلي */
        .statusbar {
            background-color: #faf8f5;
            padding: 10px 20px;
            font-size: 12px;
            color: #8a8279;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="toolbar">
        <div class="file-input-group">
            <button class="btn btn-secondary">تعديل</button>
            <button class="btn btn-secondary">معاينة</button>
            <input type="text" class="file-input" placeholder="اسم الملف...">
        </div>
        <div>
            <button class="btn btn-primary">حفظ التغييرات</button>
        </div>
    </div>

    <div class="editor-container">
        <div class="line-numbers" id="lineNumbers">1</div>
        <textarea class="editor-textarea" id="editor" placeholder="اكتب محتويات الملف هنا..." onscroll="syncScroll()"></textarea>
    </div>

    <div class="statusbar">
        <span>الترميز: UTF-8</span>
        <span>المسافات: 2</span>
    </div>
</div>

<script>
    const editor = document.getElementById('editor');
    const lineNumbers = document.getElementById('lineNumbers');

    // تحديث الأرقام تلقائياً عند الكتابة أو الضغط على Enter
    editor.addEventListener('input', () => {
        const lines = editor.value.split('\n');
        const count = lines.length;
        let lineNumbersHTML = '';
        
        for (let i = 1; i <= count; i++) {
            lineNumbersHTML += i + '<br>';
        }
        
        lineNumbers.innerHTML = lineNumbersHTML;
    });

    // مزامنة السكرول (النزول والصعود) بين النص والأرقام
    function syncScroll() {
        lineNumbers.scrollTop = editor.scrollTop;
    }
</script>

</body>
</html>
