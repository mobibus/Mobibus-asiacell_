<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الأرقام المميزة - آسياسيل</title>
  <style>
    body {
      font-family: Tahoma;
      background-color: #f4f4f4;
      text-align: center;
    }
    h1 {
      color: #d60000;
      margin-bottom: 20px;
    }
    input[type="text"] {
      padding: 10px;
      width: 320px;
      border: 2px solid #d60000;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 16px;
    }
    .category {
      margin: 20px auto;
      padding: 15px;
      border-radius: 12px;
      background-color: #fff;
      width: 95%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .category h2 {
      margin: 0;
      padding: 10px;
      border-radius: 8px;
      color: #fff;
    }
    .numbers {
      margin-top: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .number {
      display: inline-block;
      margin: 6px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #ffeaea;
      font-size: 16px;
      font-weight: bold;
      color: #333;
      width: 160px;
      position: relative;
    }
    .number::before {
      content: "★";
      color: gold;
      font-size: 18px;
      position: absolute;
      left: 8px;
      top: 5px;
    }
    /* ألوان مختلفة لكل فئة */
    .f50 h2 { background-color: #ff9999; }
    .f100 h2 { background-color: #99ccff; }
    .f250 h2 { background-color: #99ff99; }
    .f500 h2 { background-color: #ffcc99; }
    .f1m h2 { background-color: #cc99ff; }
    .f2m h2 { background-color: #66cccc; }
    .f35m h2 { background-color: #ffcc00; }
  </style>
</head>
<body>
  <h1>الأرقام المميزة - آسياسيل</h1>

  <!-- مربع البحث -->
  <input type="text" id="searchBox" placeholder="ابحث عن رقم..." onkeyup="searchNumbers()">

  <!-- فئة 50 ألف -->
  <div class="category f50">
    <h2>فئة 50,000 دينار</h2>
