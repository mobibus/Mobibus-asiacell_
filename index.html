<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الأرقام المميزة - فئة 50 ألف</title>
  <style>
    body {
      font-family: Tahoma;
      background-color: #f9f9f9;
      text-align: center;
    }
    h1 {
      color: #d60000;
      margin-bottom: 30px;
    }
    .category {
      margin: 30px auto;
      padding: 20px;
      border: 2px solid #d60000;
      border-radius: 12px;
      background-color: #fff;
      width: 60%;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .number {
      display: inline-block;
      margin: 10px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #ffeaea;
      font-size: 20px;
      font-weight: bold;
      color: #333;
      width: 200px;
      position: relative;
    }
    .number::before {
      content: "★";
      color: gold;
      font-size: 22px;
      position: absolute;
      left: 10px;
      top: 10px;
    }
  </style>
</head>
<body>
  <h1>الأرقام المميزة - فئة 50,000 دينار</h1>

  <div class="category">
    <div class="number">0770 123 4567</div>
    <div class="number">0770 765 4321</div>
    <div class="number">0770 555 8888</div>
  </div>

</body>
</html>
